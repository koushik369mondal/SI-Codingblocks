<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid 1</title>
</head>
<body>
    
    <div id="grid"></div>

    <script>
        const grid = document.getElementById('grid');

        grid.style.border = '2px solid black';
        grid.style.height ='460px';
        grid.style.width = '700px';
        grid.style.display = 'grid';
        grid.style.gridTemplateColumns = '80px 1fr 1fr';
        grid.style.gridTemplateRows = '80px 150px 150px 80px';
        grid.style.margin = '40px auto';

        function createBox(text, rowStart, rowEnd, colStart, colEnd){
            const box = document.createElement('div');

            box.innerText = text;
            box.style.border = '2px solid black';
            box.style.display = 'flex';
            box.style.justifyContent = 'center';
            box.style.alignItems = 'center';
            box.style.fontSize = '30px';

            box.style.gridRow = `${rowStart} / ${rowEnd}`;
            box.style.gridColumn = `${colStart} / ${colEnd}`;

            grid.appendChild(box);
        }

        createBox('1', 1, 2, 1, 4);
        createBox('2', 2, 4, 1, 2);
        createBox('3', 2, 3, 2, 3);
        createBox('4', 2, 3, 3, 4);
        createBox('5', 3, 4, 2, 4);
        createBox('6', 4, 5, 1, 4);
    </script>
</body>
</html>

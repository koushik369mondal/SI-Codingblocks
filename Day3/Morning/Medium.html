<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medium Clone</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="Medium.css">
</head>

<body>

    <header class="navbar">
        <div class="left">
            <i class="fa-solid fa-bars"></i>
            <h1>Medium</h1>
            <div class="search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search">
            </div>
        </div>
        <div class="right">
            <button>Get app</button>
            <a href="#">Write</a>
            <i class="fa-regular fa-bell"></i>
            <img src="../../../../myinfo/profilePic-1.JPG" alt="Profile Picture">
        </div>
    </header>

    <div class="layout">   
        <aside class="sidebar">
            <nav>
                <a href="#"><i class="fa-solid fa-house"></i> Home</a>
                <a href="#"><i class="fa-regular fa-bookmark"></i> Library</a>
                <a href="#"><i class="fa-regular fa-user"></i> Profile</a>
                <a href="#"><i class="fa-regular fa-file-lines"></i> Stories</a>
                <a href="#"><i class="fa-solid fa-chart-column"></i> Stats</a>
            </nav>
            <hr>
            <div class="following">
                <h4>Following</h4>
                <a href="#">Entrepreneurship</a>
                <a href="#">JavaScript</a>
                <a href="#">Medium Staff</a>
            </div>
        </aside>
        
        <main class="content">
            <h2>Main Feed</h2>
        </main>    
        <aside class="right-sidebar">
            <h3>Staff Picks</h3>
        </aside>    
    </div>

</body>

</html>

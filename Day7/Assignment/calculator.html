<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator using DOM</title>
</head>

<body>

    <script>
        // Body Style
        document.body.style.margin = "0";
        document.body.style.display = "flex";
        document.body.style.justifyContent = "center";
        document.body.style.alignItems = "center";
        document.body.style.height = "100vh";
        document.body.style.backgroundColor = "#f2f2f2";
        document.body.style.fontFamily = "Arial";

        // Calculator Container
        const calculator = document.createElement("div");

        calculator.style.width = "320px";
        calculator.style.padding = "20px";
        calculator.style.backgroundColor = "white";
        calculator.style.border = "2px solid black";
        calculator.style.borderRadius = "10px";

        document.body.appendChild(calculator);

        // Display
        const display = document.createElement("input");

        display.type = "text";
        display.readOnly = true;

        display.style.width = "100%";
        display.style.height = "60px";
        display.style.fontSize = "30px";
        display.style.textAlign = "right";
        display.style.marginBottom = "15px";
        display.style.boxSizing = "border-box";

        calculator.appendChild(display);

        // Grid
        const grid = document.createElement("div");

        grid.style.display = "grid";
        grid.style.gridTemplateColumns = "1fr 1fr 1fr 1fr";
        grid.style.gap = "10px";

        calculator.appendChild(grid);

        // Buttons
        const buttons = [
            "C", "⌫", "%", "/",
            "7", "8", "9", "*",
            "4", "5", "6", "-",
            "1", "2", "3", "+",
            "0", ".", "="
        ];
        // Create Buttons
        buttons.forEach(text => {
            const btn = document.createElement("button");
            btn.innerText = text;
            btn.style.height = "60px";
            btn.style.fontSize = "22px";
            btn.style.cursor = "pointer";
            // Make '=' occupy the last two columns
            if (text === "=") {
                btn.style.gridColumn = "3 / 5";
            }
            btn.onclick = function () {
                if (text === "C") {
                    display.value = "";
                }
                else if (text === "⌫") {
                    display.value = display.value.slice(0, -1);
                }
                else if (text === "=") {
                    try {
                        display.value = eval(display.value);
                    }
                    catch {
                        display.value = "Error";
                    }
                }
                else {
                    display.value += text;
                }
            };
            grid.appendChild(btn);
        });
    </script>

</body>

</html>

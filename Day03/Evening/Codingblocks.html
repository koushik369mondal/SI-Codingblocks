<!DOCTYPE html>
<html lang="en">

<head>

    <title>CodingBlocks</title>
    <link rel="stylesheet" href="Codingblocks.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body>

    <section class="hero">
        <!-- Overlay -->
        <div class="overlay"></div>
        <!-- Navbar -->
        <nav>
            <div class="logo">
                <div class="logo-icon">
                    <img src="https://cb3img.s3.ap-south-1.amazonaws.com/img/cblogo.webp" alt="CodingBlocks Logo">
                </div>
                <!-- <h2>CodingBlocks</h2> -->
            </div>
            <ul>
                <li><a class="active" href="#">Home</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">About</a></li>
                <li class="dropdown">
                    <a href="#">
                        Pages
                        <i class="fa-solid fa-angle-down"></i>
                    </a>
                </li>
                <!-- <li><a href="#">Testimonials</a></li> -->
            </ul>
            <button>Contact Support</button>
        </nav>
        <!-- Hero Content -->
        <div class="hero-content">
            <h1>
                Get
                <span>ready</span>
                for learnig skills
                <br>
                & upgrade
                <span>all aspects</span>
            </h1>
            <div class="line"></div>

                CodingBlocks provides modern web development tutorials,

                Build amazing websites with HTML, CSS, JavaScript and React.
            </p>
            <div class="buttons">
                <a href="#" class="btn green">

                </a>
                <a href="#" class="btn orange">
                    Contact Us
                </a>
            </div>
        </div>

        <div class="swiper-button-prev swiper-button-white"></div>
        <div class="swiper-button-next swiper-button-white"></div>
